<style>
:root {
  --bg: #0a0a0f; --surface: #12121a; --card: #1a1a26; --border: #2a2a40;
  --accent: #7c3aed; --accent2: #06b6d4; --text: #e2e8f0; --muted: #64748b;
  --success: #10b981; --error: #ef4444; --warn: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 20px 14px 80px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124,58,237,0.12), transparent),

}
.container { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
header { text-align: center; margin-bottom: 24px; padding-top: 10px; }
.logo-tag {
  display: inline-block; font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--accent2); letter-spacing: 4px;
  border: 1px solid var(--accent2); padding: 3px 10px; margin-bottom: 12px; opacity: 0.8;
}
h1 {
  font-size: clamp(22px, 5vw, 36px); font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 5px;
}
.subtitle { color: var(--muted); font-size: 12px; font-family: 'Share Tech Mono', monospace; }
.sheet-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-family: 'Share Tech Mono', monospace;
  color: var(--accent2); text-decoration: none; opacity: 0.7; margin-top: 6px;
}
.input-section {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px; margin-bottom: 16px;
}
.tab-bar { display: flex; gap: 8px; margin-bottom: 16px; }
.tab {
  flex: 1; padding: 9px 10px; border-radius: 8px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--muted); transition: all 0.2s;
}
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
textarea.main-input {
  width: 100%; min-height: 140px; resize: vertical;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; color: var(--text);
  font-size: 15px; line-height: 1.7; outline: none;
  font-family: 'Zen Kaku Gothic New', sans-serif; -webkit-appearance: none;
}
textarea.main-input:focus { border-color: var(--accent); }
.drop-zone {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 40px 20px; text-align: center; cursor: pointer;
  transition: all 0.2s; position: relative;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(124,58,237,0.05); }
.drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.drop-icon { font-size: 36px; margin-bottom: 8px; }
.drop-text { color: var(--muted); font-size: 14px; }
.drop-text strong { color: var(--accent2); }
#preview-img { max-width: 100%; max-height: 180px; border-radius: 8px; margin-top: 12px; display: none; }
.parse-btn {
  width: 100%; padding: 15px; margin-top: 14px;

.status-bar {

.status-bar.show { display: flex; }

.spinner {

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 480px) { .field-grid { grid-template-columns: 1fr; } }
.field-item {

.field-label { font-size: 10px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-bottom: 4px; }
.field-value input, .field-value select {

}

  border-radius: 12px; padding: 16px; margin-top: 14px;
}
.success-preview.show { display: block; }
.success-preview-title {
  font-size: 11px; font-family: 'Share Tech Mono', monospace; color: var(--success); margin-bottom: 12px;
}
.success-item {
  background: var(--surface); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
  font-size: 13px; display: flex; align-items: flex-start; gap: 10px;
}
.success-icon { color: var(--success); flex-shrink: 0; }
.success-info { flex: 1; }
.success-title { font-weight: 700; margin-bottom: 2px; }
.success-meta { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }
.history-section { margin-top: 22px; }
.history-title { font-size: 11px; font-family: 'Share Tech Mono', monospace; color: var(--muted); margin-bottom: 10px; letter-spacing: 2px; }
.history-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 13px; margin-bottom: 6px;

.h-time { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; flex-shrink: 0; }

<div class="container">

<div class="input-section">

    <button class="tab active" onclick="switchTab('text',this)">📝 貼上文字</button>

<script>
const WORKER_URL = 'https://patient-snowflake-50b3acg.ionachen.workers.dev/';
const HARDCODED_WEBHOOK = 'https://script.google.com/macros/s/AKfycbzhDpMGTUthgQnLsOfZz-kPSL7w42_Zj1Acv0f1K8bG54X70wF9D9LSMDzHad6jvfd4/exec';

const FIELDS = [
  { key: 'title',         label: 'TITLE',       full: true,  type: 'text' },
  { key: 'region',        label: 'REGION',      full: false, type: 'select', options: ['tw','hk','jp'] },
  { key: 'location',      label: 'LOCATION',    full: false, type: 'text' },
  { key: 'organizer',     label: 'ORGANIZER',   full: false, type: 'text' },
  { key: 'start_date',    label: 'START DATE',  full: false, type: 'text' },
  { key: 'end_date',      label: 'END DATE',    full: false, type: 'text' },
  { key: 'timezone',      label: 'TIMEZONE',    full: false, type: 'text' },
  { key: 'event_time',    label: 'EVENT TIME',  full: false, type: 'text' },
  { key: 'website_url',   label: 'WEBSITE',     full: true,  type: 'text' },
  { key: 'twitter_url',   label: 'TWITTER / X', full: false, type: 'text' },
  { key: 'facebook_url',  label: 'FACEBOOK',    full: false, type: 'text' },
  { key: 'instagram_url', label: 'INSTAGRAM',   full: false, type: 'text' },
  { key: 'bluesky_url',   label: 'BLUESKY',     full: false, type: 'text' },
  { key: 'city',          label: 'CITY',        full: false, type: 'text' },
  { key: 'threads',       label: 'THREADS (預覽)', full: true, type: 'text', preview: true },
];

const SYSTEM_PROMPT = `你是一個 ACG 活動資訊解析助手。從使用者提供的文字或圖片中，找出所有 ACG 相關活動，每個活動單獨解析。

今天是 ${new Date().getFullYear()}年${new Date().getMonth()+1}月${new Date().getDate()}日。

重要規則：
- 只回傳 JSON 陣列，不要有任何其他文字、說明、markdown 格式或 backtick
- region 只能是 "tw"（台灣）、"hk"（香港）、"jp"（日本）
- 日期格式必須是 YYYY/MM/DD
- 年份未標示時，優先使用今年（${new Date().getFullYear()}）；若活動日期已過今年，才考慮明年
- 社群連結若在文字或圖片中出現（包含帳號名稱 @xxx），請填入完整 URL
- instagram @xxx 轉為 https://www.instagram.com/xxx
- twitter @xxx 轉為 https://twitter.com/xxx
- timezone：台灣填 Asia/Taipei，香港填 Asia/Hong_Kong，日本填 Asia/Tokyo
- end_date：活動橫跨多天才填，單日活動留空字串
- city：根據 location 判斷所屬城市。tw 填縣市名稱（如：台北市、新北市、台中市、高雄市、台南市、桃園市）；hk 填香港島／九龍／新界其中之一；jp 填都道府縣（如：東京都、大阪府、神奈川縣、愛知縣）。無法判斷時填空字串

欄位：title, region, location, organizer, start_date, end_date, timezone, event_time, website_url, twitter_url, facebook_url, instagram_url, bluesky_url, city

範例：[{"title":"活動名稱","region":"tw","location":"台北","organizer":"主辦","start_date":"2026/03/20","end_date":"2026/05/17","timezone":"Asia/Taipei","event_time":"11:00-19:00","website_url":"","twitter_url":"","facebook_url":"","instagram_url":"","bluesky_url":"","city":"台北市"}]`;

// Threads text auto-generation
function generateThreadsText(ev) {
  const title = (ev.title || '').trim();
  const startDate = (ev.start_date || '').trim();
  const endDate = (ev.end_date || '').trim();
  const city = (ev.city || '').replace(/(市|縣|都|府|県)$/, '');
  if (!startDate || !title) return '';
  const fmt = d => { const p = d.split('/'); return p.length >= 3 ? p[1].padStart(2,'0') + '/' + p[2].padStart(2,'0') : d; };
  const loc = city ? '　📍 ' + city : '';
  if (!endDate || endDate === startDate) return fmt(startDate) + '：' + title + loc;
  return fmt(startDate) + '-' + fmt(endDate) + '：' + title + loc;
}

// Tabs
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// Image
let imageBase64 = null, imageMimeType = 'image/jpeg';
function handleFile(file) {
  if (!file) return;
  imageMimeType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    const img = document.getElementById('preview-img');
    img.src = e.target.result; img.style.display = 'block';
    document.querySelector('.drop-text').style.display = 'none';
    document.querySelector('.drop-icon').style.display = 'none';
  };
  reader.readAsDataURL(file);
}
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

// Status
function setStatus(id, type, msg, spin = false) {
  const bar = document.getElementById(id);
  if (!bar) return;
  bar.className = 'status-bar show ' + type;
  if (id === 'status-bar') {
    document.getElementById('spinner').style.display = spin ? 'block' : 'none';
    document.getElementById('status-text').textContent = msg;
  } else {
    bar.innerHTML = (spin ? '<div class="spinner"></div>' : '') + `<span>${msg}</span>`;
  }
}

// Duplicate detection
function getKnownTitles() {
  try { return JSON.parse(localStorage.getItem('known_titles') || '[]'); }
  catch { return []; }
}
function addKnownTitle(t) {
  const titles = getKnownTitles();
  if (!titles.includes(t)) {
    titles.push(t);
    localStorage.setItem('known_titles', JSON.stringify(titles));
  }
}
function isDuplicate(t) {
  return getKnownTitles().some(k => k.toLowerCase().trim() === t.toLowerCase().trim());
}

// Parse
async function parseEvents() {
  const activeTab = document.querySelector('.tab.active').textContent;
  const isImage = activeTab.includes('圖片');
  const isUrl = activeTab.includes('網址');
  
  const textInput = document.getElementById('text-input').value.trim();
  const urlInput = document.getElementById('url-input') ? document.getElementById('url-input').value.trim() : '';

  if (!isImage && !isUrl && !textInput) {
    setStatus('status-bar', 'error', '⚠ 請輸入活動文字');
    return;
  }
  if (isImage && !imageBase64) {
    setStatus('status-bar', 'error', '⚠ 請上傳圖片');
    return;
  }
  if (isUrl && !urlInput) {
    setStatus('status-bar', 'error', '⚠ 請輸入活動網址');
    return;
  }

  const btn = document.getElementById('parse-btn');
  btn.disabled = true;
  setStatus('status-bar', 'loading', 'AI 解析中…', true);
  document.getElementById('events-section').classList.remove('show');
  document.getElementById('success-preview').classList.remove('show');

  const requestBody = {
    model: 'claude-sonnet-4-5',
    max_tokens: 2000,
    system: SYSTEM_PROMPT
  };

  if (isUrl) {
    const urls = urlInput.split('\n').map(u => u.trim()).filter(Boolean);
    requestBody.sourceType = 'url';
    requestBody.urls = urls;
    requestBody.messages = [{
      role: 'user',
      content: '請解析以下網址中所有 ACG 活動資訊：\n\n' + urls.join('\n')
    }];
  } else if (isImage) {
    requestBody.messages = [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: imageMimeType, data: imageBase64 } },
        { type: 'text', text: '請解析這張圖片中所有 ACG 活動資訊' }
      ]
    }];
  } else {
    requestBody.messages = [{
      role: 'user',
      content: '請解析以下文字中所有 ACG 活動資訊：\n\n' + textInput
    }];
  }

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || 'API 錯誤：' + JSON.stringify(data));
    if (!data.content || !data.content[0]) throw new Error('API 回傳格式錯誤：' + JSON.stringify(data));

    const rawText = data.content[0].text.trim();
    console.log('AI rawText >>>', rawText);
    const arrMatch = rawText.match(/\[[\s\S]*\]/);
    if (!arrMatch) throw new Error('AI 未回傳 JSON 陣列，請再試一次');
    const events = JSON.parse(arrMatch[0]);

    if (!Array.isArray(events) || events.length === 0) throw new Error('未找到活動資訊');

    const dupCount = events.filter(e => isDuplicate(e.title || '')).length;
    renderEvents(events);
    setStatus(
      'status-bar',
      dupCount > 0 ? 'warn' : 'success',
      `✅ 解析完成，找到 ${events.length} 個活動` + (dupCount > 0 ? `（⚠ ${dupCount} 個可能重複）` : '')
    );
    document.getElementById('events-section').classList.add('show');
    document.getElementById('events-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (err) {
    setStatus('status-bar', 'error', '❌ ' + err.message);
  } finally {
    btn.disabled = false;
    document.getElementById('spinner').style.display = 'none';
  }
}


// Render
function renderEvents(events) {
  document.getElementById('events-header').textContent =
    `// 解析結果 — ${events.length} 個活動，請確認後寫入`;
  const list = document.getElementById('events-list');
  list.innerHTML = '';
  events.forEach((ev, i) => {
    if (!ev.threads) ev.threads = generateThreadsText(ev);
    const title = ev.title || '';
    const dup = title && isDuplicate(title);
    const card = document.createElement('div');
    card.className = 'event-card' + (dup ? ' duplicate' : '');
    card.dataset.index = i;
    let fieldsHtml = '<div class="field-grid">';
    FIELDS.forEach(f => {
      const rawVal = ev[f.key] || '';
      const val = String(rawVal).replace(/"/g, '&quot;');
      const fc = f.full ? ' full' : '';
      const input = f.type === 'select'
        ? `<select id="ev${i}_${f.key}">${
            f.options.map(o => `<option value="${o}"${val===o?' selected':''}>${o}</option>`).join('')
          }</select>`
        : `<input type="text" id="ev${i}_${f.key}" value="${val}"${f.preview ? ' readonly style="opacity:0.5;cursor:default"' : ''}>`;
      fieldsHtml +=
        `<div class="field-item${fc}">
           <div class="field-label">${f.label}</div>
           <div class="field-value">${input}</div>
         </div>`;
    });
    fieldsHtml += '</div>';
    card.innerHTML = `
      <div class="event-card-header">
        <span class="event-num">活動 ${i + 1}</span>
        <button class="event-remove" onclick="this.closest('.event-card').remove(); updateHeader();">✕ 移除</button>
      </div>
      <div class="duplicate-badge">⚠ 可能重複（已存在相似標題）</div>
      ${fieldsHtml}`;
    list.appendChild(card);
  });
}

function updateHeader() {
  const n = document.querySelectorAll('.event-card').length;
  document.getElementById('events-header').textContent =
    `// 解析結果 — ${n} 個活動，請確認後寫入`;
  if (n === 0) document.getElementById('events-section').classList.remove('show');
}

function getEventData(card) {
  const i = card.dataset.index;
  const d = {};
  FIELDS.forEach(f => {
    if (f.preview) return;
    const el = document.getElementById(`ev${i}_${f.key}`);
    d[f.key] = el ? el.value.trim() : '';
  });
  return d;
}

// Submit
async function submitAll() {
  const webhookUrl = HARDCODED_WEBHOOK;
  const cfg = document.getElementById('config-details');
  if (!webhookUrl) {
    setStatus('submit-status', 'error', '⚠ 請先填入 Webhook URL');
    if (cfg) cfg.setAttribute('open','');
    return;
  }

  const cards = document.querySelectorAll('.event-card');
  if (cards.length === 0) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 寫入中…';
  setStatus('submit-status', 'loading', `正在寫入 ${cards.length} 筆資料…`, true);

  const successItems = [];
  let success = 0, fail = 0;

  for (const card of cards) {
    const data = getEventData(card);
    try {
      const resp = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await resp.json();
      if (result.error) throw new Error(result.error);
      addKnownTitle(data.title);
      addHistory(data.title || '(未命名)', true);
      successItems.push(data);
      success++;
    } catch (e) {
      addHistory(data.title || '(未命名)', false);
      fail++;
    }
  }

  setStatus(
    'submit-status',
    fail === 0 ? 'success' : 'error',
    fail === 0
      ? `✅ 成功寫入 ${success} 筆！Sheet 已依日期排序`
      : `⚠ ${success} 筆成功，${fail} 筆失敗`
  );

  if (successItems.length > 0) {
    document.getElementById('success-list').innerHTML =
      successItems.map(d => `
        <div class="success-item">
          <span class="success-icon">✅</span>
          <div class="success-info">
            <div class="success-title">${d.title || '(未命名)'}</div>
            <div class="success-meta">${
              [d.region?.toUpperCase(), d.start_date, d.location]
                .filter(Boolean)
                .join(' · ')
            }</div>
          </div>
        </div>`).join('');
    document.getElementById('success-preview').classList.add('show');
  }

  btn.textContent = '✅ 寫入完成';
  setTimeout(() => {
    document.getElementById('events-section').classList.remove('show');
    document.getElementById('text-input').value = '';
    imageBase64 = null;
    const img = document.getElementById('preview-img');
    img.style.display = 'none';
    document.querySelector('.drop-text').style.display = '';
    document.querySelector('.drop-icon').style.display = '';
    btn.disabled = false;
    btn.textContent = '✅ 確認全部寫入 Google Sheet';
  }, 4000);
}

function addHistory(name, ok) {
  document.getElementById('history-section').style.display = 'block';
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML =
    `<div class="h-dot${ok ? '' : ' err'}"></div>
     <div class="h-name">${name}</div>
     <div class="h-time">${new Date().toLocaleTimeString('zh-TW')}</div>`;
  document.getElementById('history-list').prepend(item);
}
</script>
